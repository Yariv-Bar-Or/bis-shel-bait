<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ביס של בית – ניהול הזמנות</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C8973A; --gold-light: #F5E6C8; --gold-dark: #8B6520;
    --bg: #FDFAF5; --bg2: #F5EFE2; --bg3: #EDE5D0;
    --text: #2C2416; --text2: #6B5B3E; --text3: #9C8B6E;
    --border: rgba(139,101,32,0.2); --border2: rgba(139,101,32,0.35);
    --green: #27A060; --green-bg: #EAF3DE; --green-text: #27500A;
    --red: #D94040; --red-bg: #FCEBEB; --red-text: #A32D2D; --wa: #25D366;
  }
  body { font-family: 'Segoe UI','Arial Hebrew',Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:80px; }
  .header { background:var(--text); color:var(--gold-light); padding:1.2rem 1rem; border-bottom:2px solid var(--gold); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .header-logo { font-size:20px; font-weight:700; }
  .header-logo span { color:var(--gold); }
  .header-sub { font-size:11px; color:var(--text3); margin-top:2px; }
  .tabs { background:var(--bg2); border-bottom:1px solid var(--border2); display:flex; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex:1; min-width:72px; padding:12px 8px 10px; text-align:center; font-size:12px; font-weight:500; color:var(--text2); cursor:pointer; border-bottom:2.5px solid transparent; white-space:nowrap; transition:color .15s,border-color .15s; user-select:none; }
  .tab.active { color:var(--gold-dark); border-bottom-color:var(--gold); font-weight:700; }
  .tab .tab-count { display:inline-block; background:var(--gold); color:white; border-radius:9px; font-size:10px; font-weight:700; padding:1px 5px; margin-right:2px; vertical-align:middle; }
  .panel { display:none; padding:12px 12px 0; }
  .panel.active { display:block; }

  .add-box { background:white; border:1.5px solid var(--border2); border-radius:14px; padding:14px; margin-bottom:14px; }
  .add-box h2 { font-size:14px; font-weight:700; color:var(--gold-dark); margin-bottom:12px; }
  .form-row { margin-bottom:10px; }
  .form-row label { display:block; font-size:12px; color:var(--text2); margin-bottom:4px; font-weight:600; }
  .form-input { width:100%; padding:9px 11px; border:1px solid var(--border2); border-radius:8px; font-size:13px; font-family:inherit; color:var(--text); background:var(--bg); outline:none; transition:border-color .15s; }
  .form-input:focus { border-color:var(--gold); background:white; }
  textarea.form-input { resize:vertical; min-height:80px; }
  .form-row-2 { display:flex; gap:8px; }
  .form-row-2 .form-row { flex:1; }
  .del-row { display:flex; gap:8px; margin-bottom:10px; }
  .del-opt { flex:1; padding:9px 6px; border:1.5px solid var(--border2); border-radius:8px; text-align:center; font-size:13px; cursor:pointer; transition:all .15s; font-family:inherit; background:white; color:var(--text2); }
  .del-opt.sel { border-color:var(--gold); background:var(--gold-light); color:var(--gold-dark); font-weight:600; }
  .btn-add { width:100%; padding:11px; background:var(--text); color:var(--gold-light); border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:opacity .15s; }
  .btn-add:hover { opacity:.85; }
  .paste-hint { font-size:11px; color:var(--text3); margin-bottom:6px; text-align:center; }
  .btn-parse { width:100%; padding:10px; background:var(--bg3); color:var(--text); border:1.5px solid var(--border2); border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:8px; transition:background .15s; }
  .btn-parse:hover { background:var(--gold-light); border-color:var(--gold); }

  .order-card { background:white; border:1px solid var(--border); border-radius:12px; padding:13px 13px 10px; margin-bottom:10px; transition:opacity .35s; }
  .order-card.done-fade { opacity:0; pointer-events:none; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .order-name { font-size:15px; font-weight:700; color:var(--text); }
  .order-amount { font-size:16px; font-weight:700; color:var(--gold-dark); white-space:nowrap; }
  .order-meta { font-size:11px; color:var(--text3); margin-bottom:8px; display:flex; gap:7px; flex-wrap:wrap; align-items:center; }
  .badge { border-radius:20px; padding:2px 8px; font-weight:600; font-size:10px; }
  .badge-pickup  { background:var(--bg3); color:var(--text2); }
  .badge-delivery{ background:#E8F0FE; color:#1A56DB; }
  .badge-paid    { background:var(--green-bg); color:var(--green-text); }
  .badge-unpaid  { background:var(--red-bg); color:var(--red-text); }
  .badge-dt      { background:var(--gold-light); color:var(--gold-dark); }
  .order-items { font-size:12px; color:var(--text2); line-height:1.6; margin-bottom:10px; border-top:1px solid var(--border); padding-top:7px; }

  /* datetime input row */
  .dt-row { display:flex; gap:6px; align-items:center; margin-bottom:10px; }
  .dt-row input[type=datetime-local] { flex:1; padding:7px 9px; border:1px solid var(--border2); border-radius:8px; font-size:13px; font-family:inherit; color:var(--text); background:var(--bg); outline:none; }
  .dt-row input:focus { border-color:var(--gold); background:white; }
  .dt-save-btn { padding:7px 12px; border:1.5px solid var(--gold); border-radius:8px; background:var(--gold-light); color:var(--gold-dark); font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; transition:background .12s; }
  .dt-save-btn:hover { background:var(--gold); color:white; }

  /* checkboxes */
  .checks-row { display:flex; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
  .check-label { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; cursor:pointer; padding:7px 12px; border:1.5px solid var(--border2); border-radius:8px; background:var(--bg2); color:var(--text2); transition:all .15s; user-select:none; }
  .check-label input[type=checkbox] { width:16px; height:16px; accent-color:var(--green); cursor:pointer; }
  .check-label.checked-paid { border-color:var(--green); background:var(--green-bg); color:var(--green-text); }
  .check-label.checked-done { border-color:#1A56DB; background:#E8F0FE; color:#1A56DB; }

  .card-actions { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
  .btn-sm { font-size:11px; font-weight:600; padding:5px 10px; border-radius:7px; border:1.5px solid var(--border2); background:white; cursor:pointer; font-family:inherit; transition:all .12s; color:var(--text2); white-space:nowrap; text-decoration:none; display:inline-block; }
  .btn-sm:hover { border-color:var(--gold); color:var(--gold-dark); }
  .btn-sm.red { border-color:var(--red); background:var(--red-bg); color:var(--red-text); }
  .btn-sm.wa { border-color:var(--wa); background:#e8f9f0; color:#135f33; }

  .summary-section { background:white; border:1px solid var(--border); border-radius:12px; padding:13px; margin-bottom:12px; }
  .summary-section h3 { font-size:13px; font-weight:700; color:var(--gold-dark); margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:7px; }
  .summary-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:0.5px solid var(--border); font-size:13px; color:var(--text2); }
  .summary-row:last-child { border-bottom:none; }
  .summary-row .qty { font-weight:700; color:var(--text); }
  .summary-total-row { display:flex; justify-content:space-between; padding:8px 0 0; font-size:15px; font-weight:700; color:var(--text); border-top:2px solid var(--border2); margin-top:4px; }
  .summary-total-row .amount { color:var(--gold-dark); }
  .wa-btn-full { display:block; width:100%; padding:13px; background:var(--wa); color:white; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; text-align:center; text-decoration:none; margin-top:10px; transition:background .15s; }
  .wa-btn-full:hover { background:#1ebe59; }
  .empty { text-align:center; color:var(--text3); padding:40px 20px; font-size:14px; }
  .empty .empty-icon { font-size:36px; margin-bottom:10px; }
  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:var(--gold-light); border-radius:10px; padding:10px 20px; font-size:13px; font-weight:600; z-index:999; opacity:0; pointer-events:none; transition:all .25s; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .section-label { font-size:12px; font-weight:700; padding:6px 10px; border-radius:8px; margin:4px 0 8px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">ביס של <span>בית</span></div>
    <div class="header-sub">ניהול הזמנות</div>
  </div>
  <div style="font-size:11px;color:var(--text3);text-align:left;">
    <span id="header-total-orders">0</span> הזמנות<br>
    <span id="header-total-money" style="color:var(--gold);font-weight:700;">₪0</span> סה"כ
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('orders')"   id="tab-orders">📋 הזמנות <span class="tab-count" id="cnt-orders">0</span></div>
  <div class="tab"        onclick="switchTab('payments')" id="tab-payments">💳 תשלום <span class="tab-count" id="cnt-unpaid">0</span></div>
  <div class="tab"        onclick="switchTab('pickup')"   id="tab-pickup">🗓️ איסוף <span class="tab-count" id="cnt-pickup">0</span></div>
  <div class="tab"        onclick="switchTab('totals')"   id="tab-totals">📊 כמויות</div>
  <div class="tab"        onclick="switchTab('add')"      id="tab-add">➕ הוסף</div>
</div>

<div class="panel active" id="panel-orders"><div id="orders-list"></div></div>
<div class="panel"        id="panel-payments"><div id="payments-list"></div></div>
<div class="panel"        id="panel-pickup"><div id="pickup-list"></div></div>

<div class="panel" id="panel-totals">
  <div class="summary-section"><h3>🍳 סיכום כמויות לפי מנה</h3><div id="totals-items"></div></div>
  <div class="summary-section"><h3>💰 סיכום כספי</h3><div id="totals-money"></div></div>
  <a id="wa-totals-btn"   href="#" class="wa-btn-full" target="_blank">📋 שלח סיכום כמויות לוואטסאפ</a>
  <a id="wa-payments-btn" href="#" class="wa-btn-full" style="background:#1A56DB;margin-top:8px;" target="_blank">💳 שלח סיכום תשלומים לוואטסאפ</a>
  <a id="wa-pickup-btn"   href="#" class="wa-btn-full" style="background:#6B21A8;margin-top:8px;" target="_blank">🗓️ שלח סיכום איסוף לוואטסאפ</a>
  <div style="margin-top:14px;"></div>
</div>

<div class="panel" id="panel-add">
  <div class="add-box">
    <h2>📲 הדבק הזמנה מוואטסאפ</h2>
    <div class="paste-hint">הדבק כאן את הודעת הוואטסאפ שקיבלת מהלקוח</div>
    <textarea class="form-input" id="paste-input" rows="6" placeholder="הזמנה חדשה – ביס של בית&#10;שם: ...&#10;..."></textarea>
    <button class="btn-parse" onclick="parseOrder()">⚡ ייבא הזמנה</button>
  </div>
  <div class="add-box">
    <h2>✍️ הוסף הזמנה ידנית</h2>
    <div class="form-row">
      <label>שם לקוח</label>
      <input class="form-input" id="m-name" type="text" placeholder="שם מלא">
    </div>
    <div class="form-row">
      <label>פירוט הזמנה</label>
      <textarea class="form-input" id="m-items" rows="4" placeholder="קציצות עוף 800 גרם, פירה 500 גרם..."></textarea>
    </div>
    <div class="form-row-2">
      <div class="form-row">
        <label>סכום (₪)</label>
        <input class="form-input" id="m-amount" type="number" inputmode="decimal" placeholder="0">
      </div>
      <div class="form-row">
        <label>תאריך ושעה</label>
        <input class="form-input" id="m-datetime" type="datetime-local">
      </div>
    </div>
    <div class="form-row">
      <label>סוג</label>
      <div class="del-row">
        <button class="del-opt" id="opt-pickup"   onclick="setDelivOpt('pickup')">🚶 איסוף</button>
        <button class="del-opt" id="opt-delivery" onclick="setDelivOpt('delivery')">🛵 משלוח</button>
      </div>
    </div>
    <button class="btn-add" onclick="addManual()">✅ הוסף הזמנה</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MY_PHONE = "972549103442";
let currentTab = 'orders';
let manualDelivMode = 'pickup';

function loadOrders() { try { return JSON.parse(localStorage.getItem('bis_orders')||'[]'); } catch(e) { return []; } }
function saveOrders(o) { localStorage.setItem('bis_orders', JSON.stringify(o)); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  render();
}

function setDelivOpt(mode) {
  manualDelivMode = mode;
  document.getElementById('opt-pickup').classList.toggle('sel', mode==='pickup');
  document.getElementById('opt-delivery').classList.toggle('sel', mode==='delivery');
}
setDelivOpt('pickup');

// Auto-delete when both paid + done are checked
function checkAutodelete(id) {
  const orders = loadOrders();
  const o = orders.find(x => x.id===id);
  if (!o || !o.paid || !o.done) return;
  const card = document.getElementById('card-'+id);
  if (card) card.classList.add('done-fade');
  setTimeout(() => {
    saveOrders(loadOrders().filter(x => x.id!==id));
    toast('🎉 הזמנת '+o.name+' הושלמה ונמחקה');
    render();
  }, 380);
}

function togglePaid(id) {
  const orders = loadOrders();
  const o = orders.find(x => x.id===id);
  if (!o) return;
  o.paid = !o.paid;
  saveOrders(orders);
  const cb  = document.getElementById('cb-paid-'+id);
  const lbl = document.getElementById('lbl-paid-'+id);
  if (cb)  cb.checked = o.paid;
  if (lbl) lbl.className = 'check-label'+(o.paid?' checked-paid':'');
  toast(o.paid ? '✅ סומן ששולם' : '↩️ סומן כטרם שולם');
  checkAutodelete(id);
}

function toggleDone(id) {
  const orders = loadOrders();
  const o = orders.find(x => x.id===id);
  if (!o) return;
  o.done = !o.done;
  saveOrders(orders);
  const cb  = document.getElementById('cb-done-'+id);
  const lbl = document.getElementById('lbl-done-'+id);
  if (cb)  cb.checked = o.done;
  if (lbl) lbl.className = 'check-label'+(o.done?' checked-done':'');
  toast(o.done ? '📦 סומן כבוצע' : '↩️ בוטל ביצוע');
  checkAutodelete(id);
}

function saveDatetime(id) {
  const val = document.getElementById('dt-input-'+id).value;
  const orders = loadOrders();
  const o = orders.find(x => x.id===id);
  if (!o) return;
  o.datetime = val || null;
  saveOrders(orders);
  toast('📅 תאריך ושעה עודכנו');
  render();
}

function deleteOrder(id) {
  if (!confirm('למחוק הזמנה זו?')) return;
  saveOrders(loadOrders().filter(x => x.id!==id));
  render(); toast('🗑️ נמחק');
}

function parseOrder() {
  const raw = document.getElementById('paste-input').value.trim();
  if (!raw) { toast('הדבק קודם הודעה'); return; }
  const nameMatch  = raw.match(/שם:\s*(.+)/);
  const name       = nameMatch ? nameMatch[1].trim() : '';
  const totalMatch = raw.match(/סה"כ:\s*([\d.,]+)/);
  const amount     = totalMatch ? parseFloat(totalMatch[1]) : 0;
  const isDelivery = raw.includes('משלוח') && !raw.includes('איסוף עצמי');
  const lines      = raw.split('\n').filter(l => l.trim().startsWith('- '));
  const itemsText  = lines.map(l => l.trim().replace(/^- /,'')).join('\n');
  if (!name) { toast('לא נמצא שם בהודעה'); return; }
  const order = { id:Date.now(), name, items:itemsText||raw.trim(), amount, delivery:isDelivery?'delivery':'pickup', datetime:null, paid:false, done:false, ts:Date.now() };
  const orders = loadOrders(); orders.push(order); saveOrders(orders);
  document.getElementById('paste-input').value = '';
  toast('✅ הזמנה נוספה!'); switchTab('orders');
}

function addManual() {
  const name     = document.getElementById('m-name').value.trim();
  const items    = document.getElementById('m-items').value.trim();
  const amount   = parseFloat(document.getElementById('m-amount').value)||0;
  const datetime = document.getElementById('m-datetime').value||null;
  if (!name) { toast('חסר שם לקוח'); return; }
  const order = { id:Date.now(), name, items, amount, delivery:manualDelivMode, datetime, paid:false, done:false, ts:Date.now() };
  const orders = loadOrders(); orders.push(order); saveOrders(orders);
  document.getElementById('m-name').value=''; document.getElementById('m-items').value='';
  document.getElementById('m-amount').value=''; document.getElementById('m-datetime').value='';
  toast('✅ הזמנה נוספה!'); switchTab('orders');
}

function fmtDT(dt) {
  if (!dt) return null;
  const d = new Date(dt);
  if (isNaN(d)) return dt;
  return `${d.getDate()}/${d.getMonth()+1} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function waLink(text) { return `https://wa.me/${MY_PHONE}?text=${encodeURIComponent(text)}`; }
function orderWaText(o) {
  const type = o.delivery==='delivery'?'🛵 משלוח':'🚶 איסוף';
  const dt   = fmtDT(o.datetime)?` – ${fmtDT(o.datetime)}`:'';
  return `📋 הזמנת ${o.name}\n${type}${dt}\n${o.paid?'✅ שולם':'⏳ טרם שולם'}\n💰 סה"כ: ${o.amount} ₪\n\nפירוט:\n${o.items}`;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

function renderCard(o) {
  const typeBadge = o.delivery==='delivery'
    ? '<span class="badge badge-delivery">🛵 משלוח</span>'
    : '<span class="badge badge-pickup">🚶 איסוף</span>';
  const paidBadge = o.paid
    ? '<span class="badge badge-paid">✅ שולם</span>'
    : '<span class="badge badge-unpaid">⏳ טרם שולם</span>';
  const dtLabel = fmtDT(o.datetime);
  const dtBadge = dtLabel ? `<span class="badge badge-dt">📅 ${dtLabel}</span>` : '';
  return `
    <div class="order-card" id="card-${o.id}">
      <div class="card-top">
        <div class="order-name">${esc(o.name)}</div>
        <div class="order-amount">${o.amount} ₪</div>
      </div>
      <div class="order-meta">${typeBadge}${paidBadge}${dtBadge}</div>
      ${o.items?`<div class="order-items">${esc(o.items)}</div>`:''}
      <div class="dt-row">
        <input type="datetime-local" id="dt-input-${o.id}" value="${o.datetime||''}">
        <button class="dt-save-btn" onclick="saveDatetime(${o.id})">שמור תאריך</button>
      </div>
      <div class="checks-row">
        <label class="check-label${o.paid?' checked-paid':''}" id="lbl-paid-${o.id}" onclick="togglePaid(${o.id})">
          <input type="checkbox" id="cb-paid-${o.id}" ${o.paid?'checked':''} onclick="event.preventDefault()">
          שולם
        </label>
        <label class="check-label${o.done?' checked-done':''}" id="lbl-done-${o.id}" onclick="toggleDone(${o.id})">
          <input type="checkbox" id="cb-done-${o.id}" ${o.done?'checked':''} onclick="event.preventDefault()">
          בוצע
        </label>
      </div>
      <div class="card-actions">
        <a class="btn-sm wa" href="${waLink(orderWaText(o))}" target="_blank">📲 ווצאפ</a>
        <button class="btn-sm red" onclick="deleteOrder(${o.id})">🗑️ מחק</button>
      </div>
    </div>`;
}

function computeItemTotals(orders) {
  const totals = {};
  orders.forEach(o => {
    (o.items||'').split('\n').forEach(line => {
      line = line.trim().replace(/^- /,'').trim();
      if (!line) return;
      const m = line.match(/^(.+?)\s*[-–]\s*(\d+)\s*(גרם|יח')\s*=?\s*([\d.]+)?\s*₪?$/);
      if (m) {
        const key = `${m[1].trim()}__${m[3]}`;
        if (!totals[key]) totals[key] = { name:m[1].trim(), unit:m[3], qty:0 };
        totals[key].qty += parseInt(m[2]);
      }
    });
  });
  return totals;
}

function render() {
  const orders  = loadOrders();
  const total   = orders.reduce((s,o)=>s+(o.amount||0),0);
  const unpaid  = orders.filter(o=>!o.paid);
  const paid    = orders.filter(o=>o.paid);
  document.getElementById('header-total-orders').textContent = orders.length;
  document.getElementById('header-total-money').textContent  = '₪'+total.toFixed(0);
  document.getElementById('cnt-orders').textContent  = orders.length;
  document.getElementById('cnt-unpaid').textContent  = unpaid.length;
  document.getElementById('cnt-pickup').textContent  = orders.length;

  const sorted = [...orders].sort((a,b)=>{
    const da = a.datetime?new Date(a.datetime):new Date(9999,0,1);
    const db = b.datetime?new Date(b.datetime):new Date(9999,0,1);
    return da-db||b.ts-a.ts;
  });

  // ORDERS
  const ol = document.getElementById('orders-list');
  ol.innerHTML = orders.length
    ? sorted.map(o=>renderCard(o)).join('')
    : `<div class="empty"><div class="empty-icon">📭</div>אין הזמנות עדיין.<br>הוסף הזמנה בלשונית ➕</div>`;

  // PAYMENTS
  const pl = document.getElementById('payments-list');
  if (!orders.length) { pl.innerHTML=`<div class="empty"><div class="empty-icon">💳</div>אין הזמנות</div>`; }
  else {
    let h='';
    if (unpaid.length) { h+=`<div class="section-label" style="color:var(--red-text);background:var(--red-bg);">⏳ טרם שולם (${unpaid.length})</div>`; h+=unpaid.map(o=>renderCard(o)).join(''); }
    if (paid.length)   { h+=`<div class="section-label" style="color:var(--green-text);background:var(--green-bg);margin-top:8px;">✅ שולם (${paid.length})</div>`; h+=paid.map(o=>renderCard(o)).join(''); }
    pl.innerHTML = h;
  }

  // PICKUP — group by date
  const pkl = document.getElementById('pickup-list');
  if (!orders.length) { pkl.innerHTML=`<div class="empty"><div class="empty-icon">🗓️</div>אין הזמנות</div>`; }
  else {
    const byDay = {};
    sorted.forEach(o => {
      let k='ללא תאריך';
      if (o.datetime) { const d=new Date(o.datetime); if(!isNaN(d)) k=`${d.getDate()}/${d.getMonth()+1}`; }
      if (!byDay[k]) byDay[k]=[];
      byDay[k].push(o);
    });
    const days = Object.keys(byDay).sort((a,b)=>{
      if(a==='ללא תאריך') return 1; if(b==='ללא תאריך') return -1;
      const[da,ma]=a.split('/').map(Number),[db,mb]=b.split('/').map(Number);
      return (ma-mb)||(da-db);
    });
    pkl.innerHTML = days.map(day=>`
      <div class="section-label" style="color:var(--gold-dark);background:var(--gold-light);">📅 ${day} (${byDay[day].length})</div>
      ${byDay[day].map(o=>renderCard(o)).join('')}`).join('');
  }

  // TOTALS
  const itemTotals = computeItemTotals(orders);
  const keys = Object.keys(itemTotals);
  const ti = document.getElementById('totals-items');
  ti.innerHTML = !orders.length
    ? '<div style="color:var(--text3);font-size:13px;padding:8px 0">אין הזמנות</div>'
    : !keys.length
      ? '<div style="color:var(--text3);font-size:12px;">לא ניתן לנתח פריטים – בדוק פורמט</div>'
      : keys.sort().map(k=>{
          const{name,unit,qty}=itemTotals[k];
          const d=(unit==='גרם'&&qty>=1000)?`${(qty/1000).toFixed(1).replace(/\.0$/,'')} ק"ג`:`${qty} ${unit}`;
          return `<div class="summary-row"><span>${esc(name)}</span><span class="qty">${d}</span></div>`;
        }).join('');

  const tAll=orders.reduce((s,o)=>s+(o.amount||0),0);
  const tPaid=paid.reduce((s,o)=>s+(o.amount||0),0);
  const tUnpaid=unpaid.reduce((s,o)=>s+(o.amount||0),0);
  document.getElementById('totals-money').innerHTML=`
    <div class="summary-row"><span>סה"כ הזמנות</span><span class="qty">${orders.length}</span></div>
    <div class="summary-row"><span>שולם</span><span class="qty" style="color:var(--green)">${tPaid.toFixed(0)} ₪</span></div>
    <div class="summary-row"><span>ממתין</span><span class="qty" style="color:var(--red)">${tUnpaid.toFixed(0)} ₪</span></div>
    <div class="summary-total-row"><span>סה"כ</span><span class="amount">${tAll.toFixed(0)} ₪</span></div>`;

  const buildTotals = () => {
    let m=`📊 *סיכום כמויות – ביס של בית*\n\n`;
    keys.sort().forEach(k=>{const{name,unit,qty}=itemTotals[k];const d=(unit==='גרם'&&qty>=1000)?`${(qty/1000).toFixed(1).replace(/\.0$/,'')} ק"ג`:`${qty} ${unit}`;m+=`• ${name}: *${d}*\n`;});
    m+=`\nסה"כ ${orders.length} הזמנות`; return m;
  };
  const buildPayments = () => {
    let m=`💳 *סיכום תשלומים – ביס של בית*\n\n⏳ *טרם שולם (${unpaid.length})*\n`;
    unpaid.forEach(o=>m+=`• ${o.name} – ${o.amount} ₪\n`);
    m+=`\n✅ *שולם (${paid.length})*\n`;
    paid.forEach(o=>m+=`• ${o.name} – ${o.amount} ₪\n`);
    m+=`\n💰 שולם: ${tPaid} ₪ | ממתין: ${tUnpaid} ₪`; return m;
  };
  const buildPickup = () => {
    const byDay={};
    sorted.forEach(o=>{let k='ללא תאריך';if(o.datetime){const d=new Date(o.datetime);if(!isNaN(d))k=`${d.getDate()}/${d.getMonth()+1}`;}if(!byDay[k])byDay[k]=[];byDay[k].push(o);});
    const days=Object.keys(byDay).sort((a,b)=>{if(a==='ללא תאריך')return 1;if(b==='ללא תאריך')return -1;const[da,ma]=a.split('/').map(Number),[db,mb]=b.split('/').map(Number);return(ma-mb)||(da-db);});
    let m=`🗓️ *סיכום איסוף/משלוח – ביס של בית*\n\n`;
    days.forEach(day=>{
      m+=`📅 *${day}*\n`;
      byDay[day].forEach(o=>{
        const type=o.delivery==='delivery'?'🛵':'🚶';
        const time=o.datetime?` ${String(new Date(o.datetime).getHours()).padStart(2,'0')}:${String(new Date(o.datetime).getMinutes()).padStart(2,'0')}`:'';
        m+=`${type}${time} ${o.name} – ${o.amount} ₪\n`;
      });
      m+='\n';
    });
    return m;
  };
  document.getElementById('wa-totals-btn').href   = waLink(buildTotals());
  document.getElementById('wa-payments-btn').href = waLink(buildPayments());
  document.getElementById('wa-pickup-btn').href   = waLink(buildPickup());
}

render();
</script>
</body>
</html>
