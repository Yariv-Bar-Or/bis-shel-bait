<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ביס של בית – ניהול הזמנות</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #C8973A; --gold-light: #F5E6C8; --gold-dark: #8B6520;
  --bg: #FDFAF5; --bg2: #F5EFE2; --bg3: #EDE5D0;
  --text: #2C2416; --text2: #6B5B3E; --text3: #9C8B6E;
  --border: rgba(139,101,32,0.2); --border2: rgba(139,101,32,0.35);
  --green: #27A060; --green-bg: #EAF3DE; --green-text: #27500A;
  --red: #D94040; --red-bg: #FCEBEB; --red-text: #A32D2D; --wa: #25D366;
}
body { font-family: 'Segoe UI','Arial Hebrew',Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:80px; }
.header { background:var(--text); color:var(--gold-light); padding:1.2rem 1rem; border-bottom:2px solid var(--gold); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.header-logo { font-size:20px; font-weight:700; }
.header-logo span { color:var(--gold); }
.header-sub { font-size:11px; color:var(--text3); margin-top:2px; }
.tabs { background:var(--bg2); border-bottom:1px solid var(--border2); display:flex; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex:1; min-width:72px; padding:12px 8px 10px; text-align:center; font-size:12px; font-weight:500; color:var(--text2); cursor:pointer; border-bottom:2.5px solid transparent; white-space:nowrap; transition:color .15s; user-select:none; }
.tab.active { color:var(--gold-dark); border-bottom-color:var(--gold); font-weight:700; }
.tab .cnt { display:inline-block; background:var(--gold); color:white; border-radius:9px; font-size:10px; font-weight:700; padding:1px 5px; margin-right:2px; vertical-align:middle; }
.panel { display:none; padding:12px 12px 0; }
.panel.active { display:block; }
/* add form */
.add-box { background:white; border:1.5px solid var(--border2); border-radius:14px; padding:14px; margin-bottom:14px; }
.add-box h2 { font-size:14px; font-weight:700; color:var(--gold-dark); margin-bottom:12px; }
.form-row { margin-bottom:10px; }
.form-row label { display:block; font-size:12px; color:var(--text2); margin-bottom:4px; font-weight:600; }
.fi { width:100%; padding:9px 11px; border:1px solid var(--border2); border-radius:8px; font-size:13px; font-family:inherit; color:var(--text); background:var(--bg); outline:none; transition:border-color .15s; }
.fi:focus { border-color:var(--gold); background:white; }
textarea.fi { resize:vertical; min-height:80px; }
.row2 { display:flex; gap:8px; }
.row2 .form-row { flex:1; }
.del-row { display:flex; gap:8px; margin-bottom:10px; }
.del-opt { flex:1; padding:9px 6px; border:1.5px solid var(--border2); border-radius:8px; text-align:center; font-size:13px; cursor:pointer; font-family:inherit; background:white; color:var(--text2); transition:all .15s; }
.del-opt.sel { border-color:var(--gold); background:var(--gold-light); color:var(--gold-dark); font-weight:600; }
.btn-add { width:100%; padding:11px; background:var(--text); color:var(--gold-light); border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
.btn-parse { width:100%; padding:10px; background:var(--bg3); color:var(--text); border:1.5px solid var(--border2); border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; margin-top:8px; }
.btn-parse:hover { background:var(--gold-light); border-color:var(--gold); }
.paste-hint { font-size:11px; color:var(--text3); margin-bottom:6px; text-align:center; }
/* cards */
.order-card { background:white; border:1px solid var(--border); border-radius:12px; padding:13px 13px 10px; margin-bottom:10px; transition:opacity .35s; }
.order-card.done-fade { opacity:0; pointer-events:none; }
.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.order-name { font-size:15px; font-weight:700; }
.order-amount { font-size:16px; font-weight:700; color:var(--gold-dark); white-space:nowrap; }
.order-meta { display:flex; gap:7px; flex-wrap:wrap; align-items:center; margin-bottom:8px; }
.badge { border-radius:20px; padding:2px 8px; font-weight:600; font-size:10px; }
.b-pickup   { background:var(--bg3); color:var(--text2); }
.b-delivery { background:#E8F0FE; color:#1A56DB; }
.b-paid     { background:var(--green-bg); color:var(--green-text); }
.b-unpaid   { background:var(--red-bg); color:var(--red-text); }
.b-dt       { background:var(--gold-light); color:var(--gold-dark); }
.order-items { font-size:12px; color:var(--text2); line-height:1.6; margin-bottom:10px; border-top:1px solid var(--border); padding-top:7px; }
.dt-row { display:flex; gap:6px; align-items:center; margin-bottom:10px; }
.dt-row input { flex:1; padding:7px 9px; border:1px solid var(--border2); border-radius:8px; font-size:13px; font-family:inherit; color:var(--text); background:var(--bg); outline:none; }
.dt-row input:focus { border-color:var(--gold); }
.dt-save { padding:7px 12px; border:1.5px solid var(--gold); border-radius:8px; background:var(--gold-light); color:var(--gold-dark); font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; }
.dt-save:hover { background:var(--gold); color:white; }
.checks-row { display:flex; gap:10px; margin-bottom:8px; flex-wrap:wrap; }
.chk-lbl { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; cursor:pointer; padding:7px 12px; border:1.5px solid var(--border2); border-radius:8px; background:var(--bg2); color:var(--text2); transition:all .15s; user-select:none; }
.chk-lbl input[type=checkbox] { width:16px; height:16px; accent-color:var(--green); cursor:pointer; }
.chk-lbl.ck-paid { border-color:var(--green); background:var(--green-bg); color:var(--green-text); }
.chk-lbl.ck-done { border-color:#1A56DB; background:#E8F0FE; color:#1A56DB; }
.card-actions { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
.btn-sm { font-size:11px; font-weight:600; padding:5px 10px; border-radius:7px; border:1.5px solid var(--border2); background:white; cursor:pointer; font-family:inherit; color:var(--text2); white-space:nowrap; text-decoration:none; display:inline-block; }
.btn-sm:hover { border-color:var(--gold); color:var(--gold-dark); }
.btn-sm.red { border-color:var(--red); background:var(--red-bg); color:var(--red-text); }
.btn-sm.wa  { border-color:var(--wa); background:#e8f9f0; color:#135f33; }
/* totals */
.sum-box { background:white; border:1px solid var(--border); border-radius:12px; padding:13px; margin-bottom:12px; }
.sum-box h3 { font-size:13px; font-weight:700; color:var(--gold-dark); margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:7px; }
.sum-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:0.5px solid var(--border); font-size:13px; color:var(--text2); }
.sum-row:last-child { border-bottom:none; }
.sum-row .qty { font-weight:700; color:var(--text); }
.sum-total { display:flex; justify-content:space-between; padding:8px 0 0; font-size:15px; font-weight:700; border-top:2px solid var(--border2); margin-top:4px; }
.sum-total .amt { color:var(--gold-dark); }
.wa-big { display:block; width:100%; padding:13px; color:white; border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; text-align:center; margin-top:10px; }
.sec-lbl { font-size:12px; font-weight:700; padding:6px 10px; border-radius:8px; margin:4px 0 8px; }
.empty { text-align:center; color:var(--text3); padding:40px 20px; font-size:14px; }
.empty-icon { font-size:36px; margin-bottom:10px; }
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:var(--gold-light); border-radius:10px; padding:10px 20px; font-size:13px; font-weight:600; z-index:999; opacity:0; pointer-events:none; transition:all .25s; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">ביס של <span>בית</span></div>
    <div class="header-sub">ניהול הזמנות</div>
  </div>
  <div style="font-size:11px;color:var(--text3);text-align:left;">
    <span id="hdr-cnt">0</span> הזמנות<br>
    <span id="hdr-sum" style="color:var(--gold);font-weight:700;">₪0</span> סה"כ
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="go('orders')"   id="tab-orders">📋 הזמנות <span class="cnt" id="cnt-orders">0</span></div>
  <div class="tab"        onclick="go('payments')" id="tab-payments">💳 תשלום <span class="cnt" id="cnt-unpaid">0</span></div>
  <div class="tab"        onclick="go('pickup')"   id="tab-pickup">🗓️ איסוף <span class="cnt" id="cnt-pickup">0</span></div>
  <div class="tab"        onclick="go('totals')"   id="tab-totals">📊 כמויות</div>
  <div class="tab"        onclick="go('add')"      id="tab-add">➕ הוסף</div>
</div>

<div class="panel active" id="panel-orders"><div id="lst-orders"></div></div>
<div class="panel"        id="panel-payments"><div id="lst-payments"></div></div>
<div class="panel"        id="panel-pickup"><div id="lst-pickup"></div></div>

<div class="panel" id="panel-totals">
  <div class="sum-box"><h3>🍳 סיכום כמויות לפי מנה</h3><div id="tot-items"></div></div>
  <div class="sum-box"><h3>💰 סיכום כספי</h3><div id="tot-money"></div></div>
  <button class="wa-big" style="background:var(--wa);"  onclick="sendWaTotals()">📋 שלח סיכום כמויות לוואטסאפ</button>
  <button class="wa-big" style="background:#1A56DB;margin-top:8px;" onclick="sendWaPayments()">💳 שלח סיכום תשלומים לוואטסאפ</button>
  <button class="wa-big" style="background:#6B21A8;margin-top:8px;" onclick="sendWaPickup()">🗓️ שלח סיכום איסוף לוואטסאפ</button>
  <div style="height:14px;"></div>
</div>

<div class="panel" id="panel-add">
  <div class="add-box">
    <h2>📲 הדבק הזמנה מוואטסאפ</h2>
    <div class="paste-hint">הדבק כאן את הודעת הוואטסאפ שקיבלת מהלקוח</div>
    <textarea class="fi" id="paste-in" rows="6" placeholder="הזמנה חדשה – ביס של בית&#10;שם: ..."></textarea>
    <button class="btn-parse" onclick="parseOrder()">⚡ ייבא הזמנה</button>
  </div>
  <div class="add-box">
    <h2>✍️ הוסף הזמנה ידנית</h2>
    <div class="form-row"><label>שם לקוח</label><input class="fi" id="m-name" type="text" placeholder="שם מלא"></div>
    <div class="form-row"><label>פירוט הזמנה</label><textarea class="fi" id="m-items" rows="4" placeholder="קציצות עוף 800 גרם..."></textarea></div>
    <div class="row2">
      <div class="form-row"><label>סכום (₪)</label><input class="fi" id="m-amount" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="form-row"><label>תאריך ושעה</label><input class="fi" id="m-datetime" type="datetime-local"></div>
    </div>
    <div class="form-row">
      <label>סוג</label>
      <div class="del-row">
        <button class="del-opt sel" id="opt-pickup"   onclick="setDel('pickup')">🚶 איסוף</button>
        <button class="del-opt"     id="opt-delivery" onclick="setDel('delivery')">🛵 משלוח</button>
      </div>
    </div>
    <button class="btn-add" onclick="addManual()">✅ הוסף הזמנה</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var PHONE = "972549103442";
var delivMode = 'pickup';

function db()    { try { return JSON.parse(localStorage.getItem('bis_orders')||'[]'); } catch(e) { return []; } }
function save(o) { localStorage.setItem('bis_orders', JSON.stringify(o)); }

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function go(tab) {
  document.querySelectorAll('.tab').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  render();
}

function setDel(mode) {
  delivMode = mode;
  document.getElementById('opt-pickup').classList.toggle('sel', mode==='pickup');
  document.getElementById('opt-delivery').classList.toggle('sel', mode==='delivery');
}

function checkDone(id) {
  var orders = db();
  var o = orders.find(function(x){ return x.id===id; });
  if (!o || !o.paid || !o.done) return;
  var card = document.getElementById('card-'+id);
  if (card) card.classList.add('done-fade');
  var name = o.name;
  setTimeout(function(){
    save(db().filter(function(x){ return x.id!==id; }));
    toast('🎉 הזמנת '+name+' הושלמה ונמחקה');
    render();
  }, 380);
}

function togglePaid(id) {
  var orders = db();
  var o = orders.find(function(x){ return x.id===id; });
  if (!o) return;
  o.paid = !o.paid;
  save(orders);
  var cb  = document.getElementById('cb-paid-'+id);
  var lbl = document.getElementById('lbl-paid-'+id);
  if (cb)  cb.checked = o.paid;
  if (lbl) lbl.className = 'chk-lbl' + (o.paid ? ' ck-paid' : '');
  toast(o.paid ? '✅ סומן ששולם' : '↩️ סומן כטרם שולם');
  checkDone(id);
}

function toggleDone(id) {
  var orders = db();
  var o = orders.find(function(x){ return x.id===id; });
  if (!o) return;
  o.done = !o.done;
  save(orders);
  var cb  = document.getElementById('cb-done-'+id);
  var lbl = document.getElementById('lbl-done-'+id);
  if (cb)  cb.checked = o.done;
  if (lbl) lbl.className = 'chk-lbl' + (o.done ? ' ck-done' : '');
  toast(o.done ? '📦 סומן כבוצע' : '↩️ בוטל ביצוע');
  checkDone(id);
}

function saveDT(id) {
  var val = document.getElementById('dt-input-'+id).value;
  var orders = db();
  var o = orders.find(function(x){ return x.id===id; });
  if (!o) return;
  o.datetime = val || null;
  save(orders);
  toast('📅 תאריך ושעה עודכנו');
  render();
}

function delOrder(id) {
  if (!confirm('למחוק הזמנה זו?')) return;
  save(db().filter(function(x){ return x.id!==id; }));
  render();
  toast('🗑️ נמחק');
}

function parseOrder() {
  var raw = document.getElementById('paste-in').value.trim();
  if (!raw) { toast('הדבק קודם הודעה'); return; }

  var nameM  = raw.match(/שם:\s*([^\n\r]+)/);
  var name   = nameM ? nameM[1].trim() : '';
  var totalM = raw.match(/סה"כ:\s*([\d.,]+)/);
  var amount = totalM ? parseFloat(totalM[1].replace(',','.')) : 0;
  var isDel  = raw.includes('משלוח') && !raw.includes('איסוף עצמי');

  var lines = raw.split('\n').filter(function(l){ return l.trim().startsWith('- '); });
  var items = lines.map(function(l){ return l.trim().replace(/^- /,''); }).join('\n');

  if (!name) { toast('לא נמצא שם בהודעה'); return; }

  var order = { id:Date.now(), name:name, items:items||raw.trim(), amount:amount,
                delivery:isDel?'delivery':'pickup', datetime:null, paid:false, done:false, ts:Date.now() };
  var orders = db();
  orders.push(order);
  save(orders);
  document.getElementById('paste-in').value = '';
  toast('✅ הזמנה נוספה!');
  go('orders');
}

function addManual() {
  var name     = document.getElementById('m-name').value.trim();
  var items    = document.getElementById('m-items').value.trim();
  var amount   = parseFloat(document.getElementById('m-amount').value) || 0;
  var datetime = document.getElementById('m-datetime').value || null;
  if (!name) { toast('חסר שם לקוח'); return; }
  var order = { id:Date.now(), name:name, items:items, amount:amount,
                delivery:delivMode, datetime:datetime, paid:false, done:false, ts:Date.now() };
  var orders = db();
  orders.push(order);
  save(orders);
  document.getElementById('m-name').value = '';
  document.getElementById('m-items').value = '';
  document.getElementById('m-amount').value = '';
  document.getElementById('m-datetime').value = '';
  toast('✅ הזמנה נוספה!');
  go('orders');
}

function fmtDT(dt) {
  if (!dt) return null;
  var d = new Date(dt);
  if (isNaN(d)) return null;
  return d.getDate()+'/'+(d.getMonth()+1)+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}

function pad(n) { return n < 10 ? '0'+n : ''+n; }

function waLink(text) { return 'https://wa.me/'+PHONE+'?text='+encodeURIComponent(text); }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function card(o) {
  var tb = o.delivery==='delivery'
    ? '<span class="badge b-delivery">🛵 משלוח</span>'
    : '<span class="badge b-pickup">🚶 איסוף</span>';
  var pb = o.paid
    ? '<span class="badge b-paid">✅ שולם</span>'
    : '<span class="badge b-unpaid">⏳ טרם שולם</span>';
  var dt = fmtDT(o.datetime);
  var db = dt ? '<span class="badge b-dt">📅 '+dt+'</span>' : '';
  var waText = 'הזמנת '+o.name+'\n'+(o.delivery==='delivery'?'משלוח':'איסוף')+(dt?' – '+dt:'')+'\n'+(o.paid?'שולם':'טרם שולם')+'\n'+o.amount+' ₪\n\n'+o.items;
  return '<div class="order-card" id="card-'+o.id+'">'
    + '<div class="card-top"><div class="order-name">'+esc(o.name)+'</div><div class="order-amount">'+o.amount+' ₪</div></div>'
    + '<div class="order-meta">'+tb+pb+db+'</div>'
    + (o.items ? '<div class="order-items">'+esc(o.items)+'</div>' : '')
    + '<div class="dt-row"><input type="datetime-local" id="dt-input-'+o.id+'" value="'+(o.datetime||'')+'"><button class="dt-save" onclick="saveDT('+o.id+')">שמור תאריך</button></div>'
    + '<div class="checks-row">'
    +   '<label class="chk-lbl'+(o.paid?' ck-paid':'')+'" id="lbl-paid-'+o.id+'" onclick="togglePaid('+o.id+')">'
    +     '<input type="checkbox" id="cb-paid-'+o.id+'" '+(o.paid?'checked':'')+' onclick="event.preventDefault()"> שולם'
    +   '</label>'
    +   '<label class="chk-lbl'+(o.done?' ck-done':'')+'" id="lbl-done-'+o.id+'" onclick="toggleDone('+o.id+')">'
    +     '<input type="checkbox" id="cb-done-'+o.id+'" '+(o.done?'checked':'')+' onclick="event.preventDefault()"> בוצע'
    +   '</label>'
    + '</div>'
    + '<div class="card-actions">'
    +   '<a class="btn-sm wa" href="'+waLink(waText)+'" target="_blank">📲 ווצאפ</a>'
    +   '<button class="btn-sm red" onclick="delOrder('+o.id+')">🗑️ מחק</button>'
    + '</div>'
    + '</div>';
}

function itemTotals(orders) {
  var tot = {};
  orders.forEach(function(o) {
    var lines = (o.items||'').split('\n');
    lines.forEach(function(line) {
      line = line.trim().replace(/^-\s*/,'');
      if (!line) return;

      var m;

      // Format 1: "Name – sub – NNN גרם = NN ₪"  (WhatsApp form)
      m = line.match(/^(.+?)\s*[-\u2013]\s*(\d+)\s*(גרם|יח')\s*=\s*[\d.]+\s*₪/);
      if (m) {
        var name = m[1].trim().split(/\s*[-\u2013]\s*/)[0].trim();
        var key  = name+'__'+m[3];
        if (!tot[key]) tot[key] = { name:name, unit:m[3], qty:0 };
        tot[key].qty += parseInt(m[2]);
        return;
      }

      // Format 2: "NNN גרם Name"  (manual reversed)
      m = line.match(/^(\d+)\s*(גרם|יח')\s+(.+?)(?:\s*[-\u2013]\s*[\d.]+)?$/);
      if (m) {
        var name = m[3].trim().split(/\s*[-\u2013]\s*/)[0].trim();
        var key  = name+'__'+m[2];
        if (!tot[key]) tot[key] = { name:name, unit:m[2], qty:0 };
        tot[key].qty += parseInt(m[1]);
        return;
      }

      // Format 3: "Name – NNN גרם" (no price)
      m = line.match(/^(.+?)\s*[-\u2013]\s*(\d+)\s*(גרם|יח')/);
      if (m) {
        var name = m[1].trim().split(/\s*[-\u2013]\s*/)[0].trim();
        var key  = name+'__'+m[3];
        if (!tot[key]) tot[key] = { name:name, unit:m[3], qty:0 };
        tot[key].qty += parseInt(m[2]);
        return;
      }

      // Format 4: anything with a number + גרם anywhere
      m = line.match(/(\d+)\s*(גרם|יח')/);
      if (m) {
        var name = line.replace(/\d+\s*(גרם|יח').*/, '').replace(/[-\u2013=]/g,'').trim() || line;
        var key  = name+'__'+m[2];
        if (!tot[key]) tot[key] = { name:name, unit:m[2], qty:0 };
        tot[key].qty += parseInt(m[1]);
      }
    });
  });
  return tot;
}

function fmtQty(qty, unit) {
  if (unit === 'גרם' && qty >= 1000) return (qty/1000).toFixed(1).replace(/\.0$/,'') + ' ק"ג';
  return qty + ' ' + unit;
}

function sorted(orders) {
  return orders.slice().sort(function(a,b) {
    var da = a.datetime ? new Date(a.datetime) : new Date(9999,0,1);
    var db = b.datetime ? new Date(b.datetime) : new Date(9999,0,1);
    return da-db || b.ts-a.ts;
  });
}

function groupByDay(orders) {
  var byDay = {};
  orders.forEach(function(o) {
    var k = 'ללא תאריך';
    if (o.datetime) { var d=new Date(o.datetime); if(!isNaN(d)) k=d.getDate()+'/'+(d.getMonth()+1); }
    if (!byDay[k]) byDay[k] = [];
    byDay[k].push(o);
  });
  var days = Object.keys(byDay).sort(function(a,b) {
    if (a==='ללא תאריך') return 1;
    if (b==='ללא תאריך') return -1;
    var pa=a.split('/'), pb=b.split('/');
    return (parseInt(pa[1])-parseInt(pb[1])) || (parseInt(pa[0])-parseInt(pb[0]));
  });
  return { byDay:byDay, days:days };
}

function sendWaTotals() {
  var orders = db();
  var tot  = itemTotals(orders);
  var keys = Object.keys(tot).sort();
  var msg  = '\u{1F4CA} *סיכום כמויות \u2013 ביס של בית*\n\n';
  if (keys.length) {
    keys.forEach(function(k) { msg += '\u2022 '+tot[k].name+': *'+fmtQty(tot[k].qty,tot[k].unit)+'*\n'; });
  } else {
    msg += '(לא ניתן לנתח פריטים)\n';
  }
  msg += '\nסה"כ '+orders.length+' הזמנות';
  window.open(waLink(msg), '_blank');
}

function sendWaPayments() {
  var orders = db();
  var unpaid = orders.filter(function(o){ return !o.paid; });
  var paid   = orders.filter(function(o){ return o.paid; });
  var tU = unpaid.reduce(function(s,o){ return s+(o.amount||0); }, 0);
  var tP = paid.reduce(function(s,o){ return s+(o.amount||0); }, 0);
  var msg = '\u{1F4B3} *סיכום תשלומים \u2013 ביס של בית*\n\n\u23F3 *טרם שולם ('+unpaid.length+')*\n';
  unpaid.forEach(function(o){ msg += '\u2022 '+o.name+' \u2013 '+o.amount+' \u20AA\n'; });
  msg += '\n\u2705 *שולם ('+paid.length+')*\n';
  paid.forEach(function(o){ msg += '\u2022 '+o.name+' \u2013 '+o.amount+' \u20AA\n'; });
  msg += '\n\u{1F4B0} שולם: '+tP+' \u20AA | ממתין: '+tU+' \u20AA';
  window.open(waLink(msg), '_blank');
}

function sendWaPickup() {
  var orders = db();
  var s = sorted(orders);
  var g = groupByDay(s);
  var msg = '\u{1F5D3}\uFE0F *סיכום איסוף/משלוח \u2013 ביס של בית*\n\n';
  g.days.forEach(function(day) {
    msg += '\u{1F4C5} *'+day+'*\n';
    g.byDay[day].forEach(function(o) {
      var type = o.delivery==='delivery' ? '\u{1F6F5}' : '\u{1F6B6}';
      var time = '';
      if (o.datetime) { var d=new Date(o.datetime); time=' '+pad(d.getHours())+':'+pad(d.getMinutes()); }
      msg += type+time+' '+o.name+' \u2013 '+o.amount+' \u20AA\n';
    });
    msg += '\n';
  });
  window.open(waLink(msg), '_blank');
}

function render() {
  var orders = db();
  var total  = orders.reduce(function(s,o){ return s+(o.amount||0); }, 0);
  var unpaid = orders.filter(function(o){ return !o.paid; });
  var paid   = orders.filter(function(o){ return o.paid; });

  document.getElementById('hdr-cnt').textContent   = orders.length;
  document.getElementById('hdr-sum').textContent   = '\u20AA'+total.toFixed(0);
  document.getElementById('cnt-orders').textContent = orders.length;
  document.getElementById('cnt-unpaid').textContent = unpaid.length;
  document.getElementById('cnt-pickup').textContent = orders.length;

  var s = sorted(orders);

  // ORDERS
  var ol = document.getElementById('lst-orders');
  ol.innerHTML = orders.length
    ? s.map(card).join('')
    : '<div class="empty"><div class="empty-icon">📭</div>אין הזמנות עדיין.<br>הוסף בלשונית ➕</div>';

  // PAYMENTS
  var pl = document.getElementById('lst-payments');
  if (!orders.length) {
    pl.innerHTML = '<div class="empty"><div class="empty-icon">💳</div>אין הזמנות</div>';
  } else {
    var h = '';
    if (unpaid.length) {
      h += '<div class="sec-lbl" style="color:var(--red-text);background:var(--red-bg);">⏳ טרם שולם ('+unpaid.length+')</div>';
      h += unpaid.map(card).join('');
    }
    if (paid.length) {
      h += '<div class="sec-lbl" style="color:var(--green-text);background:var(--green-bg);margin-top:8px;">✅ שולם ('+paid.length+')</div>';
      h += paid.map(card).join('');
    }
    pl.innerHTML = h;
  }

  // PICKUP
  var pkl = document.getElementById('lst-pickup');
  if (!orders.length) {
    pkl.innerHTML = '<div class="empty"><div class="empty-icon">🗓️</div>אין הזמנות</div>';
  } else {
    var g = groupByDay(s);
    pkl.innerHTML = g.days.map(function(day) {
      return '<div class="sec-lbl" style="color:var(--gold-dark);background:var(--gold-light);">📅 '+day+' ('+g.byDay[day].length+')</div>'
        + g.byDay[day].map(card).join('');
    }).join('');
  }

  // TOTALS
  var tot  = itemTotals(orders);
  var keys = Object.keys(tot).sort();
  var ti   = document.getElementById('tot-items');
  if (!orders.length) {
    ti.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px 0">אין הזמנות</div>';
  } else if (!keys.length) {
    ti.innerHTML = '<div style="color:var(--text3);font-size:12px;">לא ניתן לנתח פריטים</div>';
  } else {
    ti.innerHTML = keys.map(function(k) {
      return '<div class="sum-row"><span>'+esc(tot[k].name)+'</span><span class="qty">'+fmtQty(tot[k].qty,tot[k].unit)+'</span></div>';
    }).join('');
  }

  var tAll = orders.reduce(function(s,o){ return s+(o.amount||0); }, 0);
  var tP   = paid.reduce(function(s,o){ return s+(o.amount||0); }, 0);
  var tU   = unpaid.reduce(function(s,o){ return s+(o.amount||0); }, 0);
  document.getElementById('tot-money').innerHTML =
    '<div class="sum-row"><span>סה"כ הזמנות</span><span class="qty">'+orders.length+'</span></div>'
    + '<div class="sum-row"><span>שולם</span><span class="qty" style="color:var(--green)">'+tP.toFixed(0)+' ₪</span></div>'
    + '<div class="sum-row"><span>ממתין</span><span class="qty" style="color:var(--red)">'+tU.toFixed(0)+' ₪</span></div>'
    + '<div class="sum-total"><span>סה"כ</span><span class="amt">'+tAll.toFixed(0)+' ₪</span></div>';
}

render();
</script>
</body>
</html>
