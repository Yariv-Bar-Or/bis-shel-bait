<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ביס של בית – טופס הזמנה</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C8973A;
    --gold-light: #F5E6C8;
    --gold-dark: #8B6520;
    --bg: #FDFAF5;
    --bg2: #F5EFE2;
    --bg3: #EDE5D0;
    --text: #2C2416;
    --text2: #6B5B3E;
    --text3: #9C8B6E;
    --border: rgba(139, 101, 32, 0.2);
    --border2: rgba(139, 101, 32, 0.35);
    --green-bg: #EAF3DE;
    --green-text: #27500A;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --red-border: #E24B4A;
  }

  body {
    font-family: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 70px;
  }

  /* HEADER */
  .header {
    background: var(--text);
    color: var(--gold-light);
    text-align: center;
    padding: 1.5rem 1rem 1.2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--gold);
  }
  .header-logo { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .header-logo span { color: var(--gold); }
  .header-sub { font-size: 13px; color: var(--text3); margin-top: 3px; }

  /* SECTION */
  .section { margin-bottom: 0; }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--gold-dark);
    background: var(--bg3);
    padding: 10px 16px;
    border-top: 0.5px solid var(--border2);
    border-bottom: 0.5px solid var(--border2);
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.3px;
  }
  .section-min {
    font-size: 12px;
    color: var(--text3);
    padding: 6px 16px 4px;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
  }

  /* ITEM */
  .item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 16px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg);
    transition: background 0.15s;
  }
  .item:hover { background: var(--bg2); }
  .item.has-qty { background: #FFFBF0; }
  .item.has-qty:hover { background: #FFF5D6; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; color: var(--text); line-height: 1.4; }
  .item-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
  .item-price { font-size: 12px; color: var(--text2); }
  .badge-veg {
    font-size: 10px; padding: 1px 7px;
    background: var(--green-bg); color: var(--green-text);
    border-radius: 99px; font-weight: 500;
  }
  .badge-meaty {
    font-size: 10px; padding: 1px 7px;
    background: #FDEBD0; color: #784212;
    border-radius: 99px; font-weight: 500;
  }
  .badge-beyond {
    font-size: 10px; padding: 1px 7px;
    background: #D6EAF8; color: #1A5276;
    border-radius: 99px; font-weight: 500;
  }
  .item-note { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* INLINE CHOICE (checkbox-style) */
  .item-choices {
    display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap;
  }
  .choice-btn {
    font-size: 11px; padding: 3px 10px;
    border: 1px solid var(--border2);
    border-radius: 99px;
    background: white; color: var(--text2);
    cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .choice-btn.selected {
    background: var(--gold-light);
    border-color: var(--gold);
    color: var(--gold-dark);
    font-weight: 600;
  }
  .choice-required {
    font-size: 10px; color: var(--red-text); margin-top: 3px; display: none;
  }
  .item.choice-error .choice-required { display: block; }
  .item.choice-error .item-choices .choice-btn { border-color: var(--red-border); }
  .item-error { font-size: 11px; color: var(--red-text); margin-top: 3px; display: none; }

  /* QTY CONTROL */
  .qty-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .qty-control {
    display: flex; align-items: center;
    border: 1px solid var(--border2);
    border-radius: 8px;
    overflow: hidden;
    background: white;
  }
  .qty-btn {
    width: 34px; height: 34px;
    border: none; background: var(--bg2);
    color: var(--text); font-size: 20px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: background 0.12s;
    flex-shrink: 0;
  }
  .qty-btn:hover { background: var(--bg3); }
  .qty-btn:active { background: var(--gold-light); }
  .qty-input {
    width: 58px; height: 34px;
    border: none;
    border-right: 0.5px solid var(--border);
    border-left: 0.5px solid var(--border);
    background: white;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    outline: none;
  }
  .qty-input::-webkit-outer-spin-button,
  .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .qty-unit { font-size: 11px; color: var(--text3); text-align: center; }

  /* VALIDATION ERROR STATE */
  .item.error-state .qty-control { border-color: var(--red-border); }
  .item.error-state .item-error { display: block; }

  /* SUMMARY BAR */
  .summary-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1.5px solid var(--gold);
    z-index: 200;
    box-shadow: 0 -4px 24px rgba(44,36,22,0.12);
    transition: all 0.3s ease;
  }
  /* Collapsed strip — always visible */
  .summary-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    cursor: pointer;
    user-select: none;
    gap: 10px;
  }
  .strip-total {
    font-size: 16px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .strip-count {
    font-size: 12px; color: var(--text3);
  }
  .strip-toggle {
    font-size: 13px; color: var(--gold-dark); font-weight: 600;
    background: var(--gold-light); border: 1px solid var(--gold);
    border-radius: 20px; padding: 3px 12px; white-space: nowrap;
    flex-shrink: 0;
  }
  /* Expandable panel */
  .summary-panel {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s ease;
    padding: 0 16px;
  }
  .summary-panel.open {
    max-height: 600px;
    padding-bottom: 16px;
  }
  .order-lines {
    max-height: 140px;
    overflow-y: auto;
    margin-bottom: 8px;
    padding-right: 2px;
    border-bottom: 0.5px solid var(--border);
    padding-bottom: 6px;
  }
  .order-line {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
    padding: 3px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .order-line:last-child { border-bottom: none; }
  .summary-total {
    display: flex;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 10px;
    padding-top: 6px;
  }
  .delivery-row {
    display: flex; gap: 8px; margin-bottom: 10px;
  }
  .del-btn {
    flex: 1; padding: 8px 4px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    background: white;
    color: var(--text2);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .del-btn.active {
    border-color: var(--gold);
    background: var(--gold-light);
    color: var(--gold-dark);
    font-weight: 600;
  }
  .name-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .name-input {
    flex: 1;
    padding: 9px 12px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: white;
    outline: none;
    transition: border-color 0.15s;
  }
  .name-input:focus { border-color: var(--gold); }
  .name-input.error { border-color: var(--red-border); }
  .send-btn {
    width: 100%;
    padding: 13px;
    background: #25D366;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.2px;
  }
  .send-btn:hover { background: #1ebe59; }
  .send-btn:active { transform: scale(0.98); }
  .send-btn:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; transform: none; }

  /* TOAST */
  .toast {
    position: fixed;
    top: 80px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--red-bg);
    color: var(--red-text);
    border: 1px solid var(--red-border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* WHATSAPP ICON SVG */
  .wa-icon { width: 22px; height: 22px; fill: white; flex-shrink: 0; }

  @media (max-width: 400px) {
    .qty-input { width: 46px; }
    .qty-btn { width: 30px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🏠 ביס <span>של בית</span></div>
  <div class="header-sub">אוכל ביתי, טרי ומנחם • הזמנה לפי משקל</div>
</div>

<div id="app"></div>

<div class="toast" id="toast"></div>

<div class="summary-bar" id="summary-bar">
  <!-- Collapsed strip always visible -->
  <div class="summary-strip" onclick="toggleSummary()">
    <div class="strip-total">
      🛒 <span id="total-display">0 ₪</span>
      <span class="strip-count" id="strip-count"></span>
    </div>
    <div class="strip-toggle" id="strip-toggle">פירוט ▲</div>
  </div>
  <!-- Expandable panel -->
  <div class="summary-panel" id="summary-panel">
    <div class="order-lines" id="order-lines"></div>
    <div class="summary-total">
      <span>סה"כ משוער</span>
      <span id="total-display2">0 ₪</span>
    </div>
    <div class="delivery-row">
    <button class="del-btn active" id="pickup-btn" onclick="setDelivery('pickup')">🚶 איסוף עצמי</button>
    <button class="del-btn" id="delivery-btn" onclick="setDelivery('delivery')">🛵 משלוח (+20 ₪)</button>
  </div>
  <div class="name-row">
    <input class="name-input" type="text" id="customer-name" placeholder="שם מלא לצורך ההזמנה" />
  </div>
  <button class="send-btn" onclick="sendOrder()">
    <svg class="wa-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    שלח הזמנה בוואטסאפ
  </button>
  </div><!-- end summary-panel -->
</div><!-- end summary-bar -->

<script>
const PHONE = "972549103442";

const menu = [
  {

      { id: "m6",  name: "כנפיים ברוטב מתקתק-פיקנטי", price: 6 },
      { id: "m7",  name: "קציצות עוף", price: 8.5, checkbox: "sauce_persian_moroccan", note: "לבחור רוטב: פרסי / מרוקאי" },
      { id: "m7v", name: "קציצות טופו", price: 8.5, veg: true, vegan: true, checkbox: "sauce_persian_moroccan", note: "לבחור רוטב: פרסי / מרוקאי" },
      { id: "m7x", name: "קציצות ביונד מיט", price: 9.5, veg: true, vegan: true, checkbox: "sauce_persian_moroccan", note: "לבחור רוטב: פרסי / מרוקאי" },
      { id: "m8",  name: "בורקס בשר עם צנוברים", price: 9, veganOption: "beyond", note: "סטייה של עד 100 גרם | ניתן עם ביונד (+10 ₪) = טבעוני", checkbox: "beyond_choice" },
      { id: "m9",  name: "פסטה בולונז", price: 6.5, veganOption: "beyond", note: "ניתן עם ביונד (+10 ₪) = טבעוני", checkbox: "beyond_choice" },
      { id: "m10", name: "פאי רועים", price: 8.5, veganOption: "beyond", note: "סטייה של עד 100 גרם | ניתן עם ביונד (+10 ₪) = טבעוני", checkbox: "beyond_choice" },
      { id: "m11", name: "דג מרוקאי", price: 8.5 },
      { id: "m12", name: "קציצות דג", price: 9, checkbox: "sauce_persian_moroccan", note: "לבחור רוטב: פרסי / מרוקאי" },
      { id: "m13", name: "דג סלמון בחמאת עגבניות ויין לבן", price: 15 },
      { id: "m14", name: "פסטל יווני במילוי חצילים וגבינות", price: 8, veg: true },
      { id: "m15", name: "מוקפץ תאילנדי", price: 7, checkbox: "thai_protein", note: "לבחור: עוף / טופו (טבעוני)" }
    ]
  },
  {
    id: "sides",
    title: "🍚 תוספות",
    minGrams: 500,
    minLabel: "מינימום הזמנה לכל תוספת: 500 גרם | מחיר ל-100 גרם",
    items: [
      { id: "s1", name: "אורז לבן", price: 3, veg: true, vegan: true },
      { id: "s2", name: "אורז עם אטריות", price: 3, veg: true, vegan: true },
      { id: "s3", name: "תפוחי אדמה בתנור", price: 3, veg: true, vegan: true },
      { id: "s4", name: "מיקס תפוח אדמה ובטטה", price: 4, veg: true, vegan: true },
      { id: "s5", name: "פירה (חלבי/פרווה)", price: 5, veg: true, vegNote: "חלבי = צמחוני | פרווה = טבעוני" },
      { id: "s6", name: "מג'דרה", price: 4, veg: true, vegan: true },
      { id: "s7", name: "בורגול עם בצל", price: 4, veg: true, vegan: true },
      { id: "s8", name: "חלת שישי", price: 20, unit: "יח'", fixed: true, veg: true, note: "15 ₪ ליחידה בהזמנה של 3+" }
    ]
  },
  {
    id: "salads",
    title: "🥗 סלטים וממרחים",
    minGrams: 250,
    step: 50,
    minLabel: "מינימום הזמנה לכל סלט: 250 גרם | מחיר ל-100 גרם | קפיצות 50 גרם",
    items: [
      { id: "sa1", name: "חצילים על אש גלויה בטחינה/מיונז", price: 8, veg: true, vegan: true, vegNote: "בטחינה = טבעוני | במיונז = צמחוני" },

      { id: "sa7", name: "ממרח פטה כבד", price: 7, minGrams: 500, note: "מינימום 500 גרם" }
    ]
  },
  {
    id: "condiments",
    title: "🫙 מטבלים בצנצנת",
    minGrams: 0,
    minLabel: "22 ₪ לצנצנת (כ-150 גרם) | 4 צנצנות ומעלה – 20 ₪ ליחידה",
    items: [
      { id: "c1", name: "ריבת פלפל חריף",                      price: 22, fixed: true, veg: true, vegan: true },
      { id: "c2", name: "ארטישוק קונפי עם פרמז'ן",              price: 22, fixed: true, veg: true },
      { id: "c3", name: "חמאת שום, עשבי תיבול ופרמז'ן",        price: 22, fixed: true, veg: true },
      { id: "c4", name: "לימון כבוש",                           price: 22, fixed: true, veg: true, vegan: true },
      { id: "c5", name: "כדורי לאבנה",                          price: 22, fixed: true, veg: true },
      { id: "c6", name: "סקורדליה – מטבל יווני",               price: 22, fixed: true, veg: true, vegan: true }
    ]
  }
];

// Build item lookup
const itemMap = {};
menu.forEach(sec => {
  sec.items.forEach(item => {
    itemMap[item.id] = { ...item, sectionMinGrams: sec.minGrams };
  });
});

const quantities = {};
const choices = {}; // { itemId: "persian" | "moroccan" | "beyond" | "regular" }
let deliveryMode = "pickup";

// ── RENDER ──────────────────────────────────────────────────────────────────

function renderAll() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  menu.forEach(section => {
    const secDiv = document.createElement("div");
    secDiv.className = "section";

    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = section.title;
    secDiv.appendChild(title);

    const minNote = document.createElement("div");
    minNote.className = "section-min";
    minNote.textContent = section.minLabel;
    secDiv.appendChild(minNote);

    section.items.forEach(item => {
      secDiv.appendChild(buildItemEl(item, section));
    });

    app.appendChild(secDiv);
  });
}

function buildItemEl(item, section) {
  const qty = quantities[item.id] || 0;
  const isFixed = !!item.fixed;
  const step = isFixed ? 1 : (section.step || 100);
  const unit = isFixed ? "יח'" : "גרם";
  const minQ = isFixed ? 1 : (item.minGrams || section.minGrams);
  const hasQty = qty > 0;
  const isError = hasQty && qty < minQ;
  const choiceNeeded = hasQty && item.checkbox && !choices[item.id];

  const div = document.createElement("div");
  div.className = "item" + (hasQty ? " has-qty" : "") + (isError ? " error-state" : "") + (choiceNeeded ? " choice-error" : "");
  div.id = "item-" + item.id;

  const priceLabel = isFixed ? item.price + " ₪ ליחידה" : item.price + " ₪ ל-100 גרם";
  const minLabel = isFixed ? "" : `מינימום ${minQ} גרם`;
  const errorMsg = isFixed ? "" : `⚠️ מינימום הזמנה: ${minQ} גרם`;

  // Badges
  let badges = "";
  if (item.vegan) {
    badges += ' <span class="badge-veg">🌿 טבעוני</span>';
  } else if (item.veg) {
    badges += ' <span class="badge-veg">🌱 צמחוני</span>';
  }
  if (item.veganOption === "beyond") {
    badges += ' <span class="badge-beyond">⚡ ביונד +10₪</span>';
  }

  // Inline sauce / beyond choice buttons (shown when qty > 0)
  let choiceHTML = "";
  if (hasQty && item.checkbox === "sauce_persian_moroccan") {
    const cur = choices[item.id];
    choiceHTML = `
      <div class="item-choices">
        <button class="choice-btn${cur === 'persian' ? ' selected' : ''}" onclick="setChoice('${item.id}','persian')">🫙 פרסי</button>
        <button class="choice-btn${cur === 'moroccan' ? ' selected' : ''}" onclick="setChoice('${item.id}','moroccan')">🌶️ מרוקאי</button>
      </div>
      <div class="choice-required">⚠️ יש לבחור רוטב</div>`;
  } else if (hasQty && item.checkbox === "beyond_choice") {
    const cur = choices[item.id];
    choiceHTML = `
      <div class="item-choices">
        <button class="choice-btn${cur === 'regular' ? ' selected' : ''}" onclick="setChoice('${item.id}','regular')">🥩 בשר רגיל</button>
        <button class="choice-btn${cur === 'beyond' ? ' selected' : ''}" onclick="setChoice('${item.id}','beyond')">🌿 ביונד +10₪</button>
      </div>
      <div class="choice-required">⚠️ יש לבחור סוג בשר</div>`;
  } else if (hasQty && item.checkbox === "thai_protein") {
    const cur = choices[item.id];
    choiceHTML = `
      <div class="item-choices">
        <button class="choice-btn${cur === 'chicken' ? ' selected' : ''}" onclick="setChoice('${item.id}','chicken')">🍗 עוף</button>
        <button class="choice-btn${cur === 'tofu' ? ' selected' : ''}" onclick="setChoice('${item.id}','tofu')">🌿 טופו (טבעוני)</button>
      </div>
      <div class="choice-required">⚠️ יש לבחור עוף או טופו</div>`;
  }

  // vegNote display
  const vegNoteHTML = item.vegNote ? `<div class="item-note" style="color:var(--green-text);">ℹ️ ${item.vegNote}</div>` : "";

  div.innerHTML = `
    <div class="item-info">
      <div class="item-name">${item.name}${badges}</div>
      <div class="item-meta">
        <span class="item-price">${priceLabel}</span>
        ${!isFixed ? `<span class="item-price">| ${minLabel}</span>` : ""}
      </div>
      ${item.note ? `<div class="item-note">* ${item.note}</div>` : ""}
      ${vegNoteHTML}
      ${choiceHTML}
      <div class="item-error">${errorMsg}</div>
    </div>
    <div class="qty-wrap">
      <div class="qty-control">
        <button class="qty-btn"
          onclick="changeQty('${item.id}', -${step}, ${step}, ${minQ})"
          onmousedown="startLongPress('${item.id}', -${step}, ${step}, ${minQ})"
          ontouchstart="startLongPress('${item.id}', -${step}, ${step}, ${minQ})"
          onmouseup="stopLongPress()" onmouseleave="stopLongPress()"
          ontouchend="stopLongPress()" ontouchcancel="stopLongPress()">−</button>
        <input class="qty-input" type="number" value="${qty}" min="0" step="${step}"
          id="inp-${item.id}"
          onchange="manualQty('${item.id}', this.value, ${step}, ${minQ})"
          oninput="manualQty('${item.id}', this.value, ${step}, ${minQ})">
        <button class="qty-btn"
          onclick="changeQty('${item.id}', ${step}, ${step}, ${minQ})"
          onmousedown="startLongPress('${item.id}', ${step}, ${step}, ${minQ})"
          ontouchstart="startLongPress('${item.id}', ${step}, ${step}, ${minQ})"
          onmouseup="stopLongPress()" onmouseleave="stopLongPress()"
          ontouchend="stopLongPress()" ontouchcancel="stopLongPress()">+</button>
      </div>
      <div class="qty-unit">${unit}</div>
    </div>
  `;
  return div;
}

// ── QTY LOGIC ────────────────────────────────────────────────────────────────

function changeQty(id, delta, step, minQ) {
  let cur = quantities[id] || 0;
  let next;
  if (delta > 0) {
    next = cur === 0 ? minQ : cur + step;
  } else {
    next = cur <= minQ ? 0 : cur + delta;
  }
  next = Math.max(0, next);
  quantities[id] = next;
  if (next === 0) delete choices[id];
  refreshItem(id);
  updateSummary();
}

function manualQty(id, raw, step, minQ) {
  const val = parseInt(raw) || 0;
  quantities[id] = Math.max(0, val);
  if (!quantities[id]) delete choices[id];
  refreshItem(id);
  updateSummary();
}

function setChoice(id, value) {
  choices[id] = value;
  refreshItem(id);
  updateSummary();
}

function refreshItem(id) {
  const item = itemMap[id];
  const section = menu.find(s => s.items.some(i => i.id === id));
  const newEl = buildItemEl(item, section);
  const old = document.getElementById("item-" + id);
  if (old) old.replaceWith(newEl);
}

// ── DELIVERY ─────────────────────────────────────────────────────────────────

function setDelivery(mode) {
  deliveryMode = mode;
  document.getElementById("pickup-btn").classList.toggle("active", mode === "pickup");
  document.getElementById("delivery-btn").classList.toggle("active", mode === "delivery");
  updateSummary();
}

// ── SUMMARY ──────────────────────────────────────────────────────────────────

function calcItemCost(item) {
  const qty = quantities[item.id] || 0;
  if (!qty) return 0;
  if (item.fixed) {
    // Chalah bulk discount
    if (item.id === "s8") {
      const price = (quantities["s8"] || 0) >= 3 ? 15 : item.price;
      return price * qty;
    }
    // Condiment bulk discount: 4+ jars total = 20₪ each
    if (item.id.startsWith("c")) {
      const totalJars = ["c1","c2","c3","c4","c5","c6"].reduce((s,id) => s + (quantities[id] || 0), 0);
      const price = totalJars >= 4 ? 20 : 22;
      return price * qty;
    }
    return item.price * qty;
  }
  let price = item.price;
  if (item.checkbox === "beyond_choice" && choices[item.id] === "beyond") price += 10;
  return (price * qty) / 100;
}

function calcTotal() {
  let total = 0;
  menu.forEach(sec => sec.items.forEach(item => { total += calcItemCost(item); }));
  if (deliveryMode === "delivery") total += 20;
  return total;
}

function getMinForItem(item, section) {
  if (item.fixed) return 1;
  return item.minGrams || section.minGrams;
}

function getChoiceLabel(id) {
  const c = choices[id];
  if (!c) return "";
  if (c === "persian") return " – ברוטב פרסי";
  if (c === "moroccan") return " – ברוטב מרוקאי";
  if (c === "beyond") return " – ביונד מיט";
  if (c === "chicken") return " – עם עוף";
  if (c === "tofu") return " – עם טופו (טבעוני)";
  if (c === "regular") return " – בשר רגיל";
  return "";
}

function updateSummary() {
  const allItems = menu.flatMap(s => s.items);
  const selected = allItems.filter(i => (quantities[i.id] || 0) > 0);

  const linesEl = document.getElementById("order-lines");
  if (!selected.length) {
    linesEl.innerHTML = '<div style="font-size:12px;color:var(--text3);text-align:center;padding:4px 0;">אין פריטים בהזמנה עדיין</div>';
  } else {
    linesEl.innerHTML = selected.map(item => {
      const sec = menu.find(s => s.items.some(i => i.id === item.id));
      const qty = quantities[item.id];
      const unit = item.fixed ? "יח'" : "גרם";
      const cost = calcItemCost(item).toFixed(1);
      const min = getMinForItem(item, sec);
      const isError = !item.fixed && qty < min;
      const choiceLabel = getChoiceLabel(item.id);
      // Show discounted per-unit price for condiments
      const totalJars = ["c1","c2","c3","c4","c5","c6"].reduce((s,id) => s + (quantities[id] || 0), 0);
      const jarNote = item.id.startsWith("c") && totalJars >= 4 ? " (20₪)" : "";
      return `<div class="order-line" style="${isError ? 'color:var(--red-text)' : ''}">
        <span>${isError ? '⚠️ ' : ''}${item.name}${choiceLabel}${jarNote} (${qty} ${unit})</span>
        <span>${cost} ₪</span>
      </div>`;
    }).join("");
  }

  const totalStr = calcTotal().toFixed(1) + " ₪";
  document.getElementById("total-display").textContent = totalStr;
  const td2 = document.getElementById("total-display2");
  if (td2) td2.textContent = totalStr;
  const countEl = document.getElementById("strip-count");
  if (countEl) {
    const n = menu.flatMap(s=>s.items).filter(i=>(quantities[i.id]||0)>0).length;
    countEl.textContent = n > 0 ? `(${n} פריטים)` : "";
  }
}

// ── VALIDATION & SEND ─────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

function sendOrder() {
  const name = document.getElementById("customer-name").value.trim();
  const nameInput = document.getElementById("customer-name");

  if (!name) {
    nameInput.classList.add("error");
    nameInput.focus();
    showToast("אנא הכנס שם מלא לפני שליחת ההזמנה");
    setTimeout(() => nameInput.classList.remove("error"), 2000);
    return;
  }

  const allItems = menu.flatMap(s => s.items);
  const selected = allItems.filter(i => (quantities[i.id] || 0) > 0);

  if (!selected.length) {
    showToast("אנא בחר לפחות מנה אחת 😊");
    return;
  }

  // Check minimums
  let errorItems = [];
  menu.forEach(sec => {
    sec.items.forEach(item => {
      const qty = quantities[item.id] || 0;
      if (!qty || item.fixed) return;
      const min = getMinForItem(item, sec);
      if (qty < min) errorItems.push({ name: item.name, qty, min });
    });
  });

  if (errorItems.length > 0) {
    showToast("⚠️ יש מנות מתחת למינימום — בדוק את ההזמנה");
    const firstErr = document.querySelector(".item.error-state");
    if (firstErr) firstErr.scrollIntoView({ behavior: "smooth", block: "center" });
    return;
  }

  // Check missing choices
  const missingChoice = selected.find(i => i.checkbox && !choices[i.id]);
  if (missingChoice) {
    showToast(`⚠️ יש לבחור אפשרות עבור: ${missingChoice.name}`);
    const el = document.getElementById("item-" + missingChoice.id);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
    return;
  }

  // Build WhatsApp message
  let msg = `🏠 *הזמנה חדשה – ביס של בית*\n`;
  msg += `👤 שם: ${name}\n`;
  msg += `🚗 ${deliveryMode === "delivery" ? "משלוח (+20 ₪)" : "איסוף עצמי מרחוב שלמה המלך 4"}\n\n`;
  msg += `📋 *פירוט ההזמנה:*\n`;

  menu.forEach(sec => {
    const secItems = sec.items.filter(i => (quantities[i.id] || 0) > 0);
    if (!secItems.length) return;
    msg += `\n*${sec.title.replace(/^[^ ]+ /, "")}*\n`;
    secItems.forEach(item => {
      const qty = quantities[item.id];
      const unit = item.fixed ? "יח'" : "גרם";
      const cost = calcItemCost(item).toFixed(1);
      const choiceLabel = getChoiceLabel(item.id);
      const totalJars = ["c1","c2","c3","c4","c5","c6"].reduce((s,id) => s + (quantities[id] || 0), 0);
      const jarNote = item.id.startsWith("c") && totalJars >= 4 ? " [מחיר מבצע 20₪]" : "";
      msg += `• ${item.name}${choiceLabel}${jarNote} – ${qty} ${unit} = ${cost} ₪\n`;
    });
  });

  if (deliveryMode === "delivery") msg += `\n🛵 דמי משלוח: 20 ₪`;
  msg += `\n\n💰 *סה"כ משוער: ${calcTotal().toFixed(1)} ₪*`;
  msg += `\n_(תשלום במזומן או פייבוקס)_`;

  const url = `https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`;
  window.open(url, "_blank");
}

// ── SUMMARY TOGGLE ───────────────────────────────────────────────────────────
let summaryOpen = false;
function toggleSummary() {
  summaryOpen = !summaryOpen;
  document.getElementById("summary-panel").classList.toggle("open", summaryOpen);
  document.getElementById("strip-toggle").textContent = summaryOpen ? "סגור ▼" : "פירוט ▲";
}


// ── LONG PRESS ───────────────────────────────────────────────────────────────
let longPressTimer = null;
let longPressInterval = null;

function startLongPress(id, delta, step, minQ) {
  stopLongPress();
  // After 500ms hold, start repeating every 120ms
  longPressTimer = setTimeout(() => {
    longPressInterval = setInterval(() => {
      changeQty(id, delta, step, minQ);
    }, 120);
  }, 500);
}

function stopLongPress() {
  if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  if (longPressInterval) { clearInterval(longPressInterval); longPressInterval = null; }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderAll();
updateSummary();

</script>
